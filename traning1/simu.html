<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人手不足・外国人雇用アンケート 集計レポート</title>
<style>
:root{
  --bg:#f5f7fa;--paper:#fff;--ink:#172033;--muted:#657084;--line:#dfe5ec;
  --navy:#17324d;--teal:#1f8a86;--gold:#d49a32;--red:#c85b5b;--blue:#4c78a8;
  --shadow:0 8px 28px rgba(27,46,72,.08);--radius:18px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans JP","Yu Gothic UI","Hiragino Kaku Gothic ProN",sans-serif;line-height:1.65}
header{background:linear-gradient(135deg,#10293f,#1f5966);color:white;padding:42px 24px 34px}
.header-inner,.container{max-width:1280px;margin:auto}
.eyebrow{font-size:.78rem;letter-spacing:.14em;font-weight:800;opacity:.75}
h1{font-size:clamp(1.7rem,4vw,3rem);line-height:1.25;margin:.35rem 0 .7rem}
.subtitle{max-width:850px;margin:0;color:rgba(255,255,255,.82)}
.container{padding:24px}
.toolbar{position:sticky;top:0;z-index:30;background:rgba(245,247,250,.94);backdrop-filter:blur(12px);padding:14px 0 12px;border-bottom:1px solid rgba(223,229,236,.75)}
.filters{display:grid;grid-template-columns:1fr 1.25fr 1.25fr auto;gap:10px;align-items:end}
label{font-size:.76rem;font-weight:800;color:var(--muted);display:block;margin:0 0 4px}
select,input,button{width:100%;border:1px solid var(--line);background:white;color:var(--ink);border-radius:11px;padding:10px 12px;font:inherit}
button{width:auto;cursor:pointer;font-weight:800;background:var(--navy);color:white;border-color:var(--navy);white-space:nowrap}
button:hover{filter:brightness(1.08)}
.active-filter{margin-top:8px;font-size:.82rem;color:var(--muted)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:20px 0 26px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.kpi .label{font-size:.78rem;color:var(--muted);font-weight:800}
.kpi .value{font-size:2rem;line-height:1.2;font-weight:900;margin:.25rem 0}
.kpi .note{font-size:.75rem;color:var(--muted)}
.section-title{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:28px 0 12px}
.section-title h2{margin:0;font-size:1.35rem}
.section-title p{margin:0;color:var(--muted);font-size:.82rem}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);min-width:0}
.card.wide{grid-column:1/-1}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:12px}
.qno{display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:28px;border-radius:999px;background:#e7f2f1;color:#17615e;font-weight:900;font-size:.8rem}
.card h3{font-size:1rem;line-height:1.45;margin:0;flex:1}
.nbox{text-align:right;white-space:nowrap}
.nbox strong{font-size:1.1rem}.nbox span{font-size:.72rem;color:var(--muted);display:block}
.chart-layout{display:grid;grid-template-columns:minmax(230px,.9fr) minmax(270px,1.1fr);gap:16px;align-items:center}
.canvas-wrap{height:300px;display:flex;align-items:center;justify-content:center;position:relative}
.pie{width:min(260px,86%);aspect-ratio:1;border-radius:50%;box-shadow:inset 0 0 0 2px #fff,0 8px 24px rgba(23,50,77,.08);transition:background .25s ease}
.result-table{width:100%;border-collapse:collapse;font-size:.82rem}
.result-table th,.result-table td{padding:7px 6px;border-bottom:1px solid #edf0f4;text-align:right;vertical-align:top}
.result-table th:first-child,.result-table td:first-child{text-align:left;word-break:break-word}
.result-table th{color:var(--muted);font-size:.72rem}
.bar{height:7px;background:#edf1f5;border-radius:99px;overflow:hidden;margin-top:4px}.bar>i{display:block;height:100%;background:var(--teal);border-radius:99px}
.footnote{margin:10px 0 0;font-size:.72rem;color:var(--muted)}
.empty{border:1px dashed var(--line);background:#fafbfc;border-radius:12px;padding:24px;text-align:center;color:var(--muted)}
details{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);margin:18px 0;box-shadow:var(--shadow)}
summary{cursor:pointer;padding:16px 18px;font-weight:900}
.table-scroll{overflow:auto;max-height:480px;border-top:1px solid var(--line)}
.raw-table{border-collapse:collapse;width:100%;font-size:.76rem}.raw-table th,.raw-table td{padding:8px 10px;border-bottom:1px solid #eef1f4;text-align:left;white-space:nowrap}.raw-table th{position:sticky;top:0;background:#f7f9fb;z-index:2}
footer{max-width:1280px;margin:20px auto 0;padding:18px 24px 40px;color:var(--muted);font-size:.75rem}
@media(max-width:900px){.filters{grid-template-columns:1fr 1fr}.kpis{grid-template-columns:1fr 1fr}.grid{grid-template-columns:1fr}.card.wide{grid-column:auto}.chart-layout{grid-template-columns:1fr}.canvas-wrap{height:270px}}
@media(max-width:560px){.container{padding:14px}.filters{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.kpi .value{font-size:1.55rem}.card{padding:14px}}
@media print{body{background:white}.toolbar,details,button{display:none!important}.container{max-width:none;padding:0 12px}.card,.kpi{box-shadow:none;break-inside:avoid}.grid{gap:10px}header{padding:25px 18px}.canvas-wrap{height:230px}.kpis{margin:12px 0}.section-title{margin-top:16px}}
</style>
</head>
<body>
<header><div class="header-inner">
<div class="eyebrow">SURVEY DASHBOARD</div>
<h1>人手不足・外国人雇用アンケート<br>集計レポート</h1>
<p class="subtitle">業種別に回答傾向を確認できるインタラクティブレポート。未回答・「ー」・空欄は集計から除外し、各設問の有効回答事業者数をNとして表示しています。</p>
</div></header>

<div class="container">
<div class="toolbar"><div class="filters">
<div><label for="major">大分類</label><select id="major"><option value="">すべて</option></select></div>
<div><label for="minor">中分類</label><select id="minor"><option value="">すべて</option></select></div>
<div><label for="company">事業者名</label><input id="company" placeholder="名称で検索"></div>
<div><button id="reset">フィルター解除</button></div>
</div><div id="activeFilter" class="active-filter"></div></div>

<div id="kpis" class="kpis"></div>

<div class="section-title"><div><h2>設問別集計</h2><p>円グラフと回答率・件数を併記</p></div><p>複数回答の円グラフは「選択件数構成比」です</p></div>
<div id="charts" class="grid"></div>

<details><summary>フィルター後の事業者一覧を確認</summary><div class="table-scroll"><table class="raw-table"><thead><tr><th>大分類</th><th>中分類</th><th>事業者名</th><th>Q1</th><th>Q2</th><th>Q5</th><th>Q8</th><th>Q11</th></tr></thead><tbody id="rawBody"></tbody></table></div></details>
</div>
<footer>注：元データにQ13（自由記述）の回答列が含まれていないため、本レポートでは「データなし」として表示しています。表記ゆれ（「、」「，」など）は業種フィルター上で統合しています。</footer>

const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

DATA.forEach(r=>{r._major=norm(r['大分類'])||'未分類';r._minor=norm(r['中分類'])||'未分類';});

const Q=[
 {id:'q1',no:'Q1',title:'現在の人手不足の状況',type:'multi',cols:['Q1-1','Q1-2','Q1-3','Q1-4','Q1-5'],labels:['ほぼ全年齢層で人材不足','中堅層の人材不足','若手の人材不足','おおむね現況で足りている','その他']},
 {id:'q2',no:'Q2',title:'不足している人数',type:'textdist',col:'Q2'},
 {id:'q3',no:'Q3',title:'人手不足の原因',type:'multi',cols:['Q3-1','Q3-2','Q3-3','Q3-4','Q3-5'],labels:['十分な人数を採用できない','離職率が高い','生産性が低い','業容が拡大しバランスが取れていない','その他']},
 {id:'q4',no:'Q4',title:'人手不足への対応',type:'multi',cols:['Q4-1','Q4-2','Q4-3','Q4-4','Q4-5','Q4-6'],labels:['シニア雇用を増やす','外国人を採用する','社内での配置転換','人材育成に注力','積極的な求人活動','その他']},
 {id:'q5',no:'Q5',title:'外国人労働者の採用意向',type:'single',col:'Q5',map:{1:'採用済み・一層積極化',2:'採用済み・現状維持',3:'今後採用を考えたい',4:'採用する気はない',5:'その他'}},
 {id:'q6',no:'Q6',title:'外国人労働者の採用実績',type:'single',col:'Q6',map:{1:'現在、直接雇用している',2:'現在、派遣・請負で活用',3:'その他'}},
 {id:'q7',no:'Q7',title:'採用している在留資格（ビザ種類）',type:'multi',cols:['Q7-1','Q7-2','Q7-3','Q7-4'],labels:['技能実習','特定技能','技術・人文知識・国際業務','その他']},
 {id:'q8',no:'Q8',title:'外国人労働者の現状への満足',type:'single',col:'Q8',map:{1:'満足している',2:'満足していない'}},
 {id:'q9',no:'Q9',title:'外国人労働者の現状に満足していない理由',type:'codes',cols:['Q9'],map:{1:'語学力など意思疎通',2:'労働意欲・能力',3:'他の従業員とのトラブル',4:'文化・価値観・生活習慣',5:'採用・定着コスト',6:'生活環境整備コスト',7:'その他'}},
 {id:'q10',no:'Q10',title:'外国人を採用・活用していない理由',type:'codes',cols:['Q10','Q10複数回答'],map:{1:'受け入れ態勢ができていない',2:'雇用方法がわからない',3:'トラブルが心配',4:'事業の性質上、採用・活用できない',5:'採用・定着へのコスト',6:'考えたこともない',7:'その他'}},
 {id:'q11',no:'Q11',title:'外国人雇用について詳しく話を聞きたいか',type:'single',col:'Q11',map:{1:'聞いてみたい',2:'聞かなくていい',3:'どちらでもよい'}},
 {id:'q12',no:'Q12',title:'外国人を雇用しやすくするために一番求めること',type:'multi',cols:['Q12-1','Q12-2','Q12-3','Q12-4'],labels:['住まいの確保','通勤手段の確保','補助金等の支援','その他']},
 {id:'q13',no:'Q13',title:'その他の意見（自由記述）',type:'nodata'}
];

function populateFilters(){
 const major=document.getElementById('major'),minor=document.getElementById('minor');
 [...new Set(DATA.map(r=>r._major))].sort().forEach(v=>major.insertAdjacentHTML('beforeend',`<option>${esc(v)}</option>`));
 function fillMinor(){const m=major.value;const vals=[...new Set(DATA.filter(r=>!m||r._major===m).map(r=>r._minor))].sort();minor.innerHTML='<option value="">すべて</option>'+vals.map(v=>`<option>${esc(v)}</option>`).join('');}
 major.addEventListener('change',()=>{fillMinor();render()}); minor.addEventListener('change',render); document.getElementById('company').addEventListener('input',render);
 document.getElementById('reset').addEventListener('click',()=>{major.value='';fillMinor();minor.value='';document.getElementById('company').value='';render()});
 fillMinor();
}
function filtered(){const M=document.getElementById('major').value,m=document.getElementById('minor').value,s=document.getElementById('company').value.trim().toLowerCase();return DATA.filter(r=>(!M||r._major===M)&&(!m||r._minor===m)&&(!s||r['事業者名'].toLowerCase().includes(s)));}
function splitCodes(v){if(!valid(v))return[];return String(v).replace(/[，、]/g,',').split(',').map(x=>x.trim()).filter(x=>/^\d+$/.test(x));}
function aggregate(q,rows){
 if(q.type==='nodata')return{N:0,labels:[],counts:[],multi:false};
 if(q.type==='multi'){
   const eligible=rows.filter(r=>q.cols.some(c=>valid(r[c]))); const counts=q.cols.map(c=>eligible.reduce((s,r)=>s+(num(r[c])===1?1:0),0));
   return{N:eligible.length,labels:q.labels,counts,multi:true};
 }
 if(q.type==='single'){
   const eligible=rows.filter(r=>valid(r[q.col]));const keys=Object.keys(q.map);return{N:eligible.length,labels:keys.map(k=>q.map[k]),counts:keys.map(k=>eligible.filter(r=>String(r[q.col]).trim()===k).length),multi:false};
 }
 if(q.type==='textdist'){
   const eligible=rows.filter(r=>valid(r[q.col]));const c={};eligible.forEach(r=>{let v=String(r[q.col]).trim().replace(/２/g,'2').replace(/３/g,'3').replace(/４/g,'4').replace(/～/g,'～');v=v.replace(/人$/,'');c[v]=(c[v]||0)+1});
   const order=x=>{const n=parseInt(x);return Number.isFinite(n)?n:999};const labels=Object.keys(c).sort((a,b)=>order(a)-order(b)||a.localeCompare(b,'ja'));return{N:eligible.length,labels:labels.map(x=>x+'人'),counts:labels.map(x=>c[x]),multi:false};
 }
 if(q.type==='codes'){
   const eligible=rows.filter(r=>q.cols.some(c=>valid(r[c])));const keys=Object.keys(q.map);const sets=eligible.map(r=>new Set(q.cols.flatMap(c=>splitCodes(r[c]))));return{N:eligible.length,labels:keys.map(k=>q.map[k]),counts:keys.map(k=>sets.filter(s=>s.has(k)).length),multi:true};
 }
}
function kpiHTML(rows){
 const total=rows.length;
 const shortage=rows.filter(r=>['Q1-1','Q1-2','Q1-3','Q1-5'].some(c=>num(r[c])===1)).length;
 const foreign=rows.filter(r=>['1','2'].includes(String(r.Q6).trim())).length;
 const listen=rows.filter(r=>String(r.Q11).trim()==='1').length;
 const cards=[['表示事業者数',total,'フィルター後の母数'],['人手不足あり',shortage,`${pct(shortage,total)}%`],['外国人を雇用・活用中',foreign,`${pct(foreign,total)}%`],['詳しい話を聞きたい',listen,`${pct(listen,rows.filter(r=>valid(r.Q11)).length)}%（Q11有効回答比）`]];
 return cards.map(x=>`<div class="kpi"><div class="label">${x[0]}</div><div class="value">${x[1].toLocaleString()}</div><div class="note">${x[2]}</div></div>`).join('');
}
function renderCard(q,a){
 if(q.type==='nodata')return `<section class="card wide"><div class="card-head"><span class="qno">${q.no}</span><h3>${q.title}</h3><div class="nbox"><strong>N=0</strong><span>回答列なし</span></div></div><div class="empty">元データに自由記述列が含まれていません。</div></section>`;
 const totalSelections=a.counts.reduce((s,v)=>s+v,0);const rows=a.labels.map((l,i)=>{const p=pct(a.counts[i],a.multi?a.N:totalSelections);return `<tr><td>${esc(l)}<div class="bar"><i style="width:${Math.min(p,100)}%"></i></div></td><td>${a.counts[i]}</td><td>${p}%</td></tr>`}).join('');
 return `<section class="card ${q.id==='q10'?'wide':''}"><div class="card-head"><span class="qno">${q.no}</span><h3>${q.title}</h3><div class="nbox"><strong>N=${a.N}</strong><span>有効回答事業者</span></div></div>${a.N?`<div class="chart-layout"><div class="canvas-wrap"><div class="pie" id="c-${q.id}" role="img"></div></div><div><table class="result-table"><thead><tr><th>回答</th><th>件数</th><th>${a.multi?'回答率':'構成比'}</th></tr></thead><tbody>${rows}</tbody></table><p class="footnote">${a.multi?`複数回答。選択総数 ${totalSelections}件。円グラフは選択件数構成比、表の割合はN=${a.N}に対する回答率。`:`単一回答。円グラフ・表とも有効回答内の構成比。`}</p></div></div>`:`<div class="empty">この条件では有効回答がありません。</div>`}</section>`;
}
function makeChart(q,a){
 if(!a.N)return;const el=document.getElementById('c-'+q.id);if(!el)return;
 const keep=a.counts.map((v,i)=>({v,i})).filter(x=>x.v>0), total=keep.reduce((s,x)=>s+x.v,0);
 if(!total){el.style.background='#edf1f5';el.setAttribute('aria-label','選択件数なし');return;}
 let acc=0;const stops=[];keep.forEach((x,j)=>{const start=acc/total*100;acc+=x.v;const end=acc/total*100;stops.push(`${COLORS[j%COLORS.length]} ${start}% ${end}%`)});
 el.style.background=`conic-gradient(${stops.join(',')})`;
 el.title=keep.map(x=>`${a.labels[x.i]}: ${x.v}件`).join(' / ');
 el.setAttribute('aria-label',el.title);
}
function summarizeQ1(r){const ls=['全年齢','中堅','若手','足りている','その他'];const vals=['Q1-1','Q1-2','Q1-3','Q1-4','Q1-5'].map((c,i)=>num(r[c])===1?ls[i]:null).filter(Boolean);return vals.join('、')||'—'}
function renderRaw(rows){document.getElementById('rawBody').innerHTML=rows.map(r=>`<tr><td>${esc(r._major)}</td><td>${esc(r._minor)}</td><td>${esc(r['事業者名'])}</td><td>${esc(summarizeQ1(r))}</td><td>${esc(valid(r.Q2)?r.Q2:'—')}</td><td>${esc(valid(r.Q5)?(Q[4].map[r.Q5]||r.Q5):'—')}</td><td>${esc(valid(r.Q8)?(Q[7].map[r.Q8]||r.Q8):'—')}</td><td>${esc(valid(r.Q11)?(Q[10].map[r.Q11]||r.Q11):'—')}</td></tr>`).join('')||'<tr><td colspan="8">該当事業者なし</td></tr>'}
function render(){
 const rows=filtered();document.getElementById('kpis').innerHTML=kpiHTML(rows);const aggs=Q.map(q=>aggregate(q,rows));document.getElementById('charts').innerHTML=Q.map((q,i)=>renderCard(q,aggs[i])).join('');Q.forEach((q,i)=>makeChart(q,aggs[i]));renderRaw(rows);
 const f=[document.getElementById('major').value,document.getElementById('minor').value,document.getElementById('company').value.trim()].filter(Boolean);document.getElementById('activeFilter').textContent=`表示中：${rows.length}事業者${f.length?' ／ '+f.join(' ／ '):' ／ 全体'}`;
}
populateFilters();render();
</script>
</body></html>
